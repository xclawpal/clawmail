<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawMail - Disposable Email Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="container">
        <div class="brand">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <h1 class="brand-name">ClawMail</h1>
        </div>
        <div class="header-actions">
          <button id="btnTheme" class="btn-icon" title="Toggle theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="main">
      <div class="container">
        
        <!-- Generator Section -->
        <section id="sectionGenerator" class="section-card">
          <h2 class="section-title">Generate Temporary Email</h2>
          <div class="generator-form">
            <div class="input-group">
              <input type="text" id="inputPrefix" class="input-text" placeholder="custom-name (optional)" maxlength="32">
              <span class="input-separator">@</span>
              <select id="selectDomain" class="input-select">
                <option value="">Loading domains...</option>
              </select>
            </div>
            <button id="btnCreate" class="btn-primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Create Address
            </button>
          </div>
        </section>

        <!-- Active Email Section -->
        <section id="sectionActive" class="section-card hidden">
          <div class="active-header">
            <h2 class="section-title">Active Address</h2>
            <button id="btnDestroy" class="btn-danger-sm">Delete</button>
          </div>
          <div class="email-display">
            <code id="displayEmail" class="email-text">-</code>
            <button id="btnCopy" class="btn-icon" title="Copy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </section>

        <!-- Inbox Section -->
        <section id="sectionInbox" class="section-card hidden">
          <div class="inbox-header">
            <h2 class="section-title">Inbox</h2>
            <div class="inbox-actions">
              <button id="btnExtractOTP" class="btn-secondary-sm">Extract OTP</button>
              <button id="btnReload" class="btn-icon" title="Refresh">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="listMessages" class="messages-list">
            <div class="empty-state">No messages yet</div>
          </div>
        </section>

        <!-- OTP Result -->
        <div id="otpResult" class="otp-result hidden">
          <div class="otp-label">Extracted Code:</div>
          <div class="otp-display">
            <code id="otpCode" class="otp-code">-</code>
            <button id="btnCopyOTP" class="btn-icon" title="Copy OTP">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
            </button>
          </div>
        </div>

      </div>
    </main>

    <!-- Message Modal -->
    <div id="modalMessage" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalSubject" class="modal-title">-</h3>
          <button id="btnCloseModal" class="btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div id="modalMeta" class="modal-meta">-</div>
        <div class="modal-tabs">
          <button class="tab-btn active" data-view="text">Text</button>
          <button class="tab-btn" data-view="html">HTML</button>
        </div>
        <div id="modalBody" class="modal-body">
          <div id="viewText" class="view-content active"></div>
          <div id="viewHTML" class="view-content"></div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
